<!DOCTYPE html><html><head><title>Register</title><style>body{font-family:Arial;background:#f3f6fb;display:flex;justify-content:center;align-items:center;height:100vh}.box{background:white;padding:35px;border-radius:14px;width:400px;box-shadow:0 10px 30px #ccc}input,button{width:100%;padding:12px;margin:9px 0;border-radius:7px;box-sizing:border-box}button{background:#2563eb;color:white;border:0;font-weight:bold}</style></head><body><div class="box"><h2>Register User</h2>{% if error %}<p style="color:red">{{ error }}</p>{% endif %}<form method="POST"><input name="name" placeholder="Name" required><input name="email" type="email" placeholder="Email" required><input name="phone" placeholder="Phone" required><input name="password" type="password" placeholder="Password" required><button>Register</button></form><a href="/">Back to Login</a></div></body></html>
