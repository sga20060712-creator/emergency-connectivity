{% extends 'base.html' %}{% set heading='Admin Service Management' %}{% block content %}<div class="card"><h3>Add New Service</h3><form action="/admin/add_service" method="POST"><select name="module"><option>Blood</option><option>Oxygen</option><option>Ambulance</option><option>Organs</option><option>ICU</option></select><input name="item" placeholder="Item" required><input name="location" placeholder="Location" required><input name="quantity" type="number" placeholder="Quantity" required><input name="status" placeholder="Status" required><input name="contact" placeholder="Contact" required><button class="btn green">Add</button></form></div><br><table><tr><th>ID</th><th>Module</th><th>Item</th><th>Location</th><th>Qty</th><th>Status</th><th>Action</th></tr>{% for s in services %}<tr><td>{{ s.id }}</td><td>{{ s.module }}</td><td>{{ s.item }}</td><td>{{ s.location }}</td><td>{{ s.quantity }}</td><td>{{ s.status }}</td><td><a class="btn red" href="/admin/delete_service/{{ s.id }}">Delete</a></td></tr>{% endfor %}</table>{% endblock %}
