{% extends 'base.html' %}{% set heading='My Emergency Requests' %}{% block content %}<table><tr><th>ID</th><th>Module</th><th>Item</th><th>Patient</th><th>Phone</th><th>Status</th><th>Date</th></tr>{% for r in requests %}<tr><td>{{ r.id }}</td><td>{{ r.module }}</td><td>{{ r.item }}</td><td>{{ r.patient }}</td><td>{{ r.phone }}</td><td><span class="badge {{ r.status }}">{{ r.status }}</span></td><td>{{ r.created_at }}</td></tr>{% endfor %}</table>{% endblock %}
