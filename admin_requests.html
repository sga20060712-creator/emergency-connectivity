{% extends 'base.html' %}{% set heading='All Emergency Requests' %}{% block content %}<table><tr><th>ID</th><th>User</th><th>Module</th><th>Item</th><th>Patient</th><th>Phone</th><th>Status</th><th>Action</th></tr>{% for r in requests %}<tr><td>{{ r.id }}</td><td>{{ r.username }}</td><td>{{ r.module }}</td><td>{{ r.item }}</td><td>{{ r.patient }}</td><td>{{ r.phone }}</td><td><span class="badge {{ r.status }}">{{ r.status }}</span></td><td><a class="btn green" href="/admin/update_request/{{ r.id }}/Approved">Approve</a> <a class="btn" href="/admin/update_request/{{ r.id }}/Success">Success</a> <a class="btn red" href="/admin/update_request/{{ r.id }}/Rejected">Reject</a></td></tr>{% endfor %}</table>{% endblock %}
