{% extends 'base.html' %}{% set heading=module + ' Services' %}{% block content %}<div class="grid">{% for s in services %}<div class="card"><h2>{{ s.item }}</h2><p><b>Location:</b> {{ s.location }}</p><p><b>Quantity:</b> {{ s.quantity }}</p><p><b>Status:</b> {{ s.status }}</p><p><b>Contact:</b> {{ s.contact }}</p><form action="/request_service" method="POST"><input type="hidden" name="module" value="{{ s.module }}"><input type="hidden" name="item" value="{{ s.item }}"><input name="patient" placeholder="Patient Name" required><input name="phone" placeholder="Phone Number" required><input name="address" placeholder="Address" required><button class="btn green" type="submit">Request Now</button></form></div>{% endfor %}</div>{% endblock %}
